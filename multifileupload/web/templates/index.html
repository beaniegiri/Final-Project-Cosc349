<!DOCTYPE html>
<html>
<head>
    <title>Multi File Upload</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 40px;
        }

        .container {
            width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        .upload-box {
            border: 2px dashed #aaa;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #eee;
            margin: 5px;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Multi File Upload System</h2>

    <form method="POST" enctype="multipart/form-data">
        <div class="upload-box">
            <input type="file" name="files" multiple>
        </div>
        <button type="submit">Upload</button>
    </form>

    <h3>Uploaded Files</h3>
    <ul>
        {% for file in files %}
            <li>{{ file }}</li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
