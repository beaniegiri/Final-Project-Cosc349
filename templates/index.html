<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SYN/ACK | Multi-File Transfer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>SYN/ACK TRANSFER <small>v1.0</small></h1>
            <p>COSC 349: Reliable Multi-File TCP Stream</p>
        </header>

        {% if message %}
        <div class="notification {{ status }}">
            {{ message }}
        </div>
        {% endif %}

        <section class="upload-zone">
            <form action="/upload" method="post" enctype="multipart/form-data">
                <div class="input-wrapper">
                    <input type="file" name="file_list" id="file_list" multiple>
                    <label for="file_list">DRAG & DROP OR BROWSE</label>
                </div>
                <button type="submit" class="btn-main">INITIALIZE TCP STREAM</button>
            </form>
        </section>

        <div id="status-bar">
            <span>NETWORK STATUS: <strong class="online">CONNECTED</strong></span>
            <span style="margin-left: 20px; color: #555;">PROTOCOL: TCP (SYN/ACK HANDSHAKE)</span>
        </div>
    </div>
</body>
</html>
